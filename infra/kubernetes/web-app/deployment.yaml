apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: web-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web-app
    spec:
      serviceAccountName: web-app
      imagePullSecrets:
        - name: registry-secret
      containers:
        - name: web-app
          image: rg.fr-par.scw.cloud/hierphant-test/web-app:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "3000"
          envFrom:
            - secretRef:
                name: web-app-env

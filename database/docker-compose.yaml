services:
  postgres:
    image: postgres:18
    env_file: docker-compose.env
    environment:
      POSTGRES_DB: hr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

